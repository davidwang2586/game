<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pitch Screener v1.0</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            border: 4px solid #444;
            background-color: #70c5ce;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 70vh;
        }
        #ui {
            text-align: center;
            margin-bottom: 10px;
        }
        .msg {
            font-size: 16px;
            color: #aaa;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Doorbell Access Screening</h2>
        <div class="msg" id="statusMsg">Score 15 points to unlock the front door intercom.</div>
    </div>

    <canvas id="gameCanvas" width="320" height="480"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const statusMsg = document.getElementById("statusMsg");

// Game variables
let bird = { x: 50, y: 150, radius: 12, velocity: 0, gravity: 0.4, jump: -6 };
let pipes = [];
let score = 0;
let gameOver = false;
let gameStarted = false;
let frameCount = 0;

// Difficulty Settings
const EASY_GAP = 130;
const IMPOSSIBLE_GAP = 26; // Barely larger than the bird's diameter (24px)

function resetGame() {
    bird.y = 150;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
    gameStarted = false;
    frameCount = 0;
    statusMsg.innerText = "Score 15 points to unlock the front door intercom.";
    statusMsg.style.color = "#aaa";
}

function spawnPipe() {
    // Determine gap based on current score
    let gap = (score >= 10) ? IMPOSSIBLE_GAP : EASY_GAP;
    
    let minHeight = 40;
    let maxHeight = canvas.height - gap - 40;
    let pipeTopHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
    
    pipes.push({
        x: canvas.width,
        top: pipeTopHeight,
        bottom: canvas.height - pipeTopHeight - gap,
        passed: false,
        gapSize: gap
    });
}

function handleTap() {
    if (gameOver) {
        resetGame();
    } else {
        if (!gameStarted) gameStarted = true;
        // Make the physics incredibly tight/punishing after score 10
        if (score >= 10) {
            bird.velocity = -4.5; // Weaker, twitchier jump
        } else {
            bird.velocity = bird.jump;
        }
    }
}

// Controls (Both screen taps and spacebar)
window.addEventListener("keydown", (e) => { if(e.code === "Space") handleTap(); });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleTap(); }, {passive: false});
canvas.addEventListener("mousedown", handleTap);

function update() {
    if (!gameStarted || gameOver) return;

    frameCount++;
    
    // Change physics engine settings dynamically at score 10
    if (score >= 10) {
        bird.gravity = 0.7; // Harder drop
    } else {
        bird.gravity = 0.4;
    }

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    // Floor / Ceiling collisions
    if (bird.y + bird.radius >= canvas.height || bird.y - bird.radius <= 0) {
        endGame();
    }

    // Spawn pipes
    // Spawn faster/closer together once they hit level 10 to induce panic
    let spawnRate = (score >= 10) ? 75 : 100;
    if (frameCount % spawnRate === 0) {
        spawnPipe();
    }

    // Move and check pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= (score >= 10) ? 3.5 : 2.5; // Speed up slightly at 10

        // Collision detection
        let bLeft = bird.x - bird.radius;
        let bRight = bird.x + bird.radius;
        let bTop = bird.y - bird.radius;
        let bBottom = bird.y + bird.radius;

        let pLeft = pipes[i].x;
        let pRight = pipes[i].x + 50; // Pipe width

        if (bRight > pLeft && bLeft < pRight) {
            if (bTop < pipes[i].top || bBottom > canvas.height - pipes[i].bottom) {
                endGame();
            }
        }

        // Score tracking
        if (!pipes[i].passed && pRight < bird.x) {
            pipes[i].passed = true;
            score++;
            if (score === 10) {
                statusMsg.innerText = "🚨 LEVEL 2: SECURITY PROTOCOL ACTIVATED 🚨";
                statusMsg.style.color = "#ff4444";
            }
        }

        // Remove off-screen pipes
        if (pipes[i].x + 50 < 0) {
            pipes.splice(i, 1);
        }
    }
}

function endGame() {
    gameOver = true;
    if (score >= 10) {
        statusMsg.innerText = `Game Over. Score: ${score}. Access Denied permanently.`;
    } else {
        statusMsg.innerText = `Game Over. Score: ${score}. Try again to unlock intercom.`;
    }
    statusMsg.style.color = "#ff4444";
}

function draw() {
    // Sky
    ctx.fillStyle = (score >= 10) ? "#2c3e50" : "#70c5ce"; // Turn sky dark at score 10
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Pipes
    pipes.forEach(pipe => {
        ctx.fillStyle = (score >= 10) ? "#e74c3c" : "#73bf2e"; // Pipes turn red at score 10
        // Top pipe
        ctx.fillRect(pipe.x, 0, 50, pipe.top);
        // Bottom pipe
        ctx.fillRect(pipe.x, canvas.height - pipe.bottom, 50, pipe.bottom);
    });

    // Bird
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#f1c40f";
    ctx.fill();
    ctx.closePath();

    // Score Text
    ctx.fillStyle = "white";
    ctx.font = "bold 34px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(score, canvas.width / 2, 60);

    if (!gameStarted && !gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "20px sans-serif";
        ctx.fillText("Tap to Begin Test", canvas.width / 2, canvas.height / 2);
    }
    
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "24px sans-serif";
        ctx.fillText("ACCESS DENIED", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "16px sans-serif";
        ctx.fillText("Tap to Retry Screening", canvas.width / 2, canvas.height / 2 + 20);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Initial pipe spawn
spawnPipe();
loop();
</script>
</body>
</html>
